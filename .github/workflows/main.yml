name: Persistent Runner Loop

on:
  push:
  workflow_dispatch:
  repository_dispatch:
    types: [restart-runner]

permissions:
  contents: write
  actions: write

jobs:
  runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore State
        run: |
          if [ -f state.tar.gz ]; then
            echo "Restoring state..."
            tar -xzf state.tar.gz
            cat state/last_run.txt || true
          else
            echo "First run - no state found."
          fi

      - name: Setup Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

          # NOTE:
          # Ephemeral behavior is controlled via the auth key (NOT CLI flag)
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=gh-runner-${{ github.run_id }} \
            --ssh

      - name: Active Session Loop
        run: |
          echo "Runner started at $(date)"
          echo "Previous run: $(cat state/last_run.txt 2>/dev/null || echo 'N/A')"

          # Improved loop instead of single sleep
          for i in {1..30}; do
            echo "Minute $i - still alive at $(date)"
            
            # Check Tailscale status (basic health check)
            tailscale status || echo "Tailscale check failed"

            sleep 60
          done

      - name: Save State
        if: always()
        run: |
          echo "Saving state..."
          mkdir -p state
          echo "Last run at $(date)" > state/last_run.txt
          tar -czf state.tar.gz state

      - name: Commit and Push State
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.tar.gz

          if ! git diff --cached --quiet; then
            git commit -m "Update state for run ${{ github.run_id }}"
            for i in 1 2 3; do
              git push && break
              echo "Retry push ($i)..."
              sleep 5
            done
          else
            echo "No changes to commit."
          fi

      - name: Cleanup Tailscale
        if: always()
        run: |
          # Ensures clean disconnect (important if not using ephemeral keys)
          sudo tailscale down || true

      - name: Restart Runner Loop
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting before restart..."
          sleep 15

          echo "Triggering next run..."

          curl --fail -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$REPO/dispatches \
            -d '{"event_type": "restart-runner"}'
