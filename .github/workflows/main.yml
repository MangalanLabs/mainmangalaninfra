- name: Backup, Chunk, and Restart
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Increase Git buffer for large chunk pushes
          git config --global http.postBuffer 524288000

          echo "Cleaning system to save space..."
          sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*

          echo "Zipping (Optimized)..."
          # Exclude heavy folders that aren't 'your' data to keep the zip small
          sudo tar -czf system_backup.tar.gz / \
            --exclude=/system_backup.tar.gz \
            --exclude=/proc --exclude=/sys --exclude=/dev --exclude=/run \
            --exclude=/boot --exclude=/var/cache --exclude=/var/log \
            --exclude=/usr/share/doc --exclude=/usr/share/man \
            --exclude=${{ github.workspace }} \
            --one-file-system 2> /dev/null || true

          echo "Chunking..."
          split -b 90M system_backup.tar.gz system_backup.tar.gz.part_
          rm system_backup.tar.gz

          echo "Pushing to GitHub..."
          git add system_backup.tar.gz.part_*
          if ! git diff --cached --quiet; then
            git commit -m "Full System State: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${{ github.ref }} --force
          fi

          echo "Triggering Restart..."
          curl -X POST -H "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/${{ github.repository }}/dispatches \
               -d '{"event_type": "restart-runner"}'
